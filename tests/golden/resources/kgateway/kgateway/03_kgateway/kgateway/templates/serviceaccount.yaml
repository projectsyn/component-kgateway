apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: kgateway
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kgateway
    app.kubernetes.io/version: v2.2.3
    helm.sh/chart: kgateway-v2.2.3
    kgateway: kgateway
  name: kgateway
  namespace: syn-kgateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kgateway-role-syn-kgateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kgateway-syn-kgateway
subjects:
  - kind: ServiceAccount
    name: kgateway
    namespace: syn-kgateway
